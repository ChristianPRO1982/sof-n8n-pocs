<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test webhook n8n</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --border: #dbe3ee;
      --text: #142033;
      --muted: #5b6b83;
      --primary: #0b6ef3;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 760px;
      margin: 48px auto;
      padding: 0 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 1.4rem;
    }

    p {
      margin-top: 0;
      color: var(--muted);
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 600;
    }

    input,
    textarea,
    button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 1rem;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      margin-top: 14px;
      background: var(--primary);
      color: #fff;
      border: 0;
      cursor: pointer;
      font-weight: 600;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .result {
      margin-top: 18px;
      background: #0e17261a;
      border-radius: 8px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Test du webhook n8n</h1>
      <p>Envoi d’un message en POST JSON vers: <code id="webhookUrl"></code></p>

      <form id="chatForm">
        <label for="sessionId">Session ID (optionnel)</label>
        <input id="sessionId" name="sessionId" type="text" placeholder="session-123" />

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Tapez votre message..." required></textarea>

        <button id="sendBtn" type="submit">Envoyer au webhook</button>
      </form>

      <div class="result" id="result">Aucune requête envoyée.</div>
    </div>
  </div>

  <script>
    const WEBHOOK_URL = "http://15.236.66.128/webhook/chat-poc";
    const form = document.getElementById("chatForm");
    const result = document.getElementById("result");
    const sendBtn = document.getElementById("sendBtn");
    const webhookUrlText = document.getElementById("webhookUrl");

    webhookUrlText.textContent = WEBHOOK_URL;

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const sessionId = document.getElementById("sessionId").value.trim();
      const message = document.getElementById("message").value.trim();

      if (!message) {
        result.textContent = "Le message est obligatoire.";
        return;
      }

      const payload = { message };
      if (sessionId) payload.sessionId = sessionId;

      sendBtn.disabled = true;
      result.textContent = "Envoi en cours...";

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json, text/plain, */*"
          },
          body: JSON.stringify(payload)
        });

        const rawText = await response.text();
        let parsed;
        try {
          parsed = JSON.parse(rawText);
        } catch {
          parsed = rawText;
        }

        result.textContent =
          `HTTP ${response.status} ${response.statusText}\n\n` +
          JSON.stringify(parsed, null, 2);
      } catch (error) {
        result.textContent =
          "Erreur lors de l'appel webhook.\n" +
          "Vérifiez le CORS et l'accessibilité de l'URL.\n\n" +
          String(error);
      } finally {
        sendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
