<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MD5 Helper - Sofinco</title>
  <style>
    :root {
      --bg-1: #f6f9ff;
      --bg-2: #ecf2ff;
      --panel: #ffffff;
      --border: #d5e2f5;
      --text: #0d223d;
      --muted: #4f6585;
      --primary: #005bbb;
      --primary-dark: #004996;
      --success: #047857;
      --radius-lg: 18px;
      --radius-md: 12px;
      --shadow: 0 18px 40px rgba(8, 44, 92, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(0, 91, 187, 0.11) 0%, transparent 30%),
        radial-gradient(circle at 85% 16%, rgba(255, 122, 0, 0.08) 0%, transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      padding: 24px 16px;
      display: grid;
      place-items: center;
    }

    .panel {
      width: 100%;
      max-width: 560px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px;
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.2rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #294a73;
    }

    input {
      width: 100%;
      border: 1px solid #cbdcf4;
      border-radius: 10px;
      padding: 12px;
      font: inherit;
      color: var(--text);
      background: #ffffff;
    }

    input:focus {
      outline: none;
      border-color: #9fc1ef;
      box-shadow: 0 0 0 4px rgba(0, 91, 187, 0.12);
    }

    .result-wrap {
      display: grid;
      gap: 8px;
    }

    .result {
      min-height: 48px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: #f8fbff;
      font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
      word-break: break-all;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(180deg, #0b66cf 0%, var(--primary) 100%);
      color: #fff;
      box-shadow: 0 8px 16px rgba(0, 91, 187, 0.22);
    }

    .btn-secondary {
      background: #eef3fb;
      color: var(--primary-dark);
      border: 1px solid #d5e2f5;
    }

    .status {
      min-height: 22px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .status.success {
      color: var(--success);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Générateur MD5</h1>
    <p>Saisissez le mot de passe en clair. Le hash MD5 peut ensuite être copié dans `ADMIN_ACCESS_KEY`.</p>

    <label for="passwordInput">
      Mot de passe
      <input id="passwordInput" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" />
    </label>

    <div class="result-wrap">
      <div id="hashOutput" class="result" aria-live="polite"></div>
      <div class="actions">
        <button id="copyBtn" class="btn btn-primary" type="button">Copier le hash</button>
        <button id="clearBtn" class="btn btn-secondary" type="button">Effacer</button>
      </div>
    </div>

    <div id="status" class="status" aria-live="polite"></div>
  </main>

  <script src="./auth.js"></script>
  <script>
    const passwordInput = document.getElementById("passwordInput");
    const hashOutput = document.getElementById("hashOutput");
    const copyBtn = document.getElementById("copyBtn");
    const clearBtn = document.getElementById("clearBtn");
    const status = document.getElementById("status");

    passwordInput.addEventListener("input", updateHash);
    copyBtn.addEventListener("click", onCopy);
    clearBtn.addEventListener("click", onClear);

    updateHash();

    async function updateHash() {
      const value = passwordInput.value;
      if (!value) {
        hashOutput.textContent = "";
        status.textContent = "";
        status.className = "status";
        return;
      }

      hashOutput.textContent = await window.UIChatSimpleAuth.md5(value);
      status.textContent = "";
      status.className = "status";
    }

    async function onCopy() {
      const hash = hashOutput.textContent.trim();
      if (!hash) return;
      await navigator.clipboard.writeText(hash);
      status.textContent = "Hash copié.";
      status.className = "status success";
    }

    function onClear() {
      passwordInput.value = "";
      hashOutput.textContent = "";
      status.textContent = "";
      status.className = "status";
      passwordInput.focus();
    }
  </script>
</body>
</html>
