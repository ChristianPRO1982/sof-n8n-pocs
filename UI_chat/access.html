<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clé d'accès - Sofinco</title>
  <style>
    :root {
      --bg-1: #f6f9ff;
      --bg-2: #ecf2ff;
      --panel: #ffffff;
      --panel-soft: #f8fbff;
      --border: #d5e2f5;
      --text: #0d223d;
      --muted: #4f6585;
      --primary: #005bbb;
      --primary-dark: #004996;
      --danger: #b42318;
      --radius-lg: 18px;
      --radius-md: 12px;
      --shadow: 0 18px 40px rgba(8, 44, 92, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(0, 91, 187, 0.11) 0%, transparent 30%),
        radial-gradient(circle at 85% 16%, rgba(255, 122, 0, 0.08) 0%, transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      padding: 24px 16px;
      display: grid;
      place-items: center;
    }

    .panel {
      width: 100%;
      max-width: 480px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px;
      display: grid;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand img {
      width: 150px;
      height: auto;
      object-fit: contain;
      flex-shrink: 0;
    }

    h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.01em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #294a73;
      display: grid;
      gap: 6px;
    }

    input {
      width: 100%;
      border: 1px solid #cbdcf4;
      border-radius: 10px;
      padding: 12px;
      font: inherit;
      color: var(--text);
      background: #ffffff;
    }

    input:focus {
      outline: none;
      border-color: #9fc1ef;
      box-shadow: 0 0 0 4px rgba(0, 91, 187, 0.12);
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.92rem;
      transition: transform 120ms ease, box-shadow 160ms ease, opacity 160ms ease;
      cursor: pointer;
      background: linear-gradient(180deg, #0b66cf 0%, var(--primary) 100%);
      color: #fff;
      box-shadow: 0 8px 16px rgba(0, 91, 187, 0.22);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .status {
      min-height: 22px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .error {
      min-height: 22px;
      font-size: 0.92rem;
      color: var(--danger);
      font-weight: 600;
    }

    .back-link {
      color: var(--primary-dark);
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 540px) {
      body { padding: 12px; }
      .panel { padding: 18px; }
      .brand { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="brand">
      <img src="https://raw.githubusercontent.com/ChristianPRO1982/sof-n8n-pocs/refs/heads/main/UI_chat/logo-sofinco.png" alt="Logo MaPrimeRenov" />
      <div>
        <h1>Accès protégé</h1>
        <p>Cette zone de pré-production nécessite une clé d'accès simple.</p>
      </div>
    </div>

    <div id="accessStatus" class="status" aria-live="polite">Chargement de la configuration...</div>
    <div id="accessError" class="error" aria-live="polite"></div>

    <form id="accessForm">
      <label for="accessKey">
        Clé d'accès
        <input id="accessKey" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" required />
      </label>
      <button class="btn" type="submit">Valider</button>
    </form>

    <a class="back-link" href="./index.html">Retour au chatbot public</a>
  </main>

  <script src="./auth.js"></script>
  <script>
    window.UIChatSimpleAuth.initAccessPage({ defaultRedirect: "./admin.html" }).catch((error) => {
      console.error(error);
      window.UIChatSimpleAuth.renderFatalError("Impossible de charger la configuration d'accès.");
    });
  </script>
</body>
</html>
