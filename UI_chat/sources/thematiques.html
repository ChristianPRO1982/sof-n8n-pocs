<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUD Thématiques - Sofinco</title>
  <style>
    :root {
      --bg-1: #f6f9ff;
      --bg-2: #ecf2ff;
      --panel: #ffffff;
      --border: #d5e2f5;
      --text: #0d223d;
      --muted: #4f6585;
      --primary: #005bbb;
      --danger: #b42318;
      --success: #047857;
      --radius-lg: 18px;
      --radius-md: 12px;
      --shadow: 0 18px 40px rgba(8, 44, 92, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(0, 91, 187, 0.11) 0%, transparent 30%),
        radial-gradient(circle at 85% 16%, rgba(255, 122, 0, 0.08) 0%, transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      padding: 28px 16px 40px;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 20px 24px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo {
      width: 170px;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .header h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.01em;
    }

    .header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .main {
      padding: 16px 18px 20px;
      display: grid;
      gap: 12px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status {
      min-height: 24px;
      font-size: 0.93rem;
      color: var(--muted);
      padding: 0 4px;
    }

    .status.success { color: var(--success); font-weight: 600; }
    .status.error { color: var(--danger); font-weight: 600; }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: auto;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 540px;
    }

    th, td {
      border-bottom: 1px solid #e5eefc;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #eef5ff;
      color: #153a6a;
      white-space: nowrap;
    }

    .cell-id {
      font-weight: 700;
      color: #0b2d56;
      white-space: nowrap;
    }

    .cell-input {
      width: 100%;
      border: 1px solid #cbdcf4;
      border-radius: 8px;
      padding: 7px 8px;
      font: inherit;
      color: #17375f;
      background: #fff;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 9px 12px;
      font-weight: 600;
      font-size: 0.87rem;
      cursor: pointer;
      text-decoration: none;
      transition: transform 120ms ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(180deg, #0b66cf 0%, var(--primary) 100%);
      color: #fff;
      box-shadow: 0 8px 16px rgba(0, 91, 187, 0.22);
    }

    .btn-danger {
      background: #ffe9e8;
      color: #8f1f16;
      border: 1px solid #f7c7c4;
    }

    .footer-actions {
      display: flex;
      justify-content: flex-end;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <header class="header">
        <a href="../index.html" aria-label="Retour à la page d'accueil">
          <img
            src="https://raw.githubusercontent.com/ChristianPRO1982/sof-n8n-pocs/refs/heads/main/UI_chat/logo-sofinco.png"
            alt="Logo MaPrimeRenov"
            class="logo"
          />
        </a>
        <div>
          <h1>Gestion des thématiques</h1>
          <p>CRUD simple sur la table <code>renov_thematique</code>.</p>
        </div>
      </header>

      <div class="main">
        <form id="crudForm" method="post">
          <div class="toolbar">
            <div id="status" class="status" role="status" aria-live="polite">Chargement...</div>
            <button class="btn btn-primary" type="submit">Enregistrer</button>
          </div>

          <div class="table-wrap">
            <table aria-label="Table des thématiques">
              <thead>
                <tr>
                  <th>id</th>
                  <th>Libellé</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr><td colspan="3">Chargement...</td></tr>
              </tbody>
            </table>
          </div>

          <div class="footer-actions">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script>
    const TABLE_NAME = "renov_thematique";
    const FALLBACK_ENDPOINTS = {
      C: "http://15.236.66.128/n8n/webhook-test/51b0418f-a18b-419d-814d-b0d6a6d8ba8d",
      R: "http://15.236.66.128/n8n/webhook-test/e99e3774-1dfb-49a6-aeb8-348046a412a2",
      U: "http://15.236.66.128/n8n/webhook-test/fb72fc88-369d-41ec-ac63-7d3e623dd119",
      D: "http://15.236.66.128/n8n/webhook-test/476cf9cd-2cd6-4240-bf0f-0052ff5ccc24"
    };

    const state = {
      config: null,
      endpoints: { ...FALLBACK_ENDPOINTS },
      rows: []
    };

    const dom = {
      form: document.getElementById("crudForm"),
      status: document.getElementById("status"),
      tableBody: document.getElementById("tableBody")
    };

    init().catch((error) => {
      setStatus(`Erreur d'initialisation: ${error.message || error}`, true);
    });

    async function init() {
      state.config = await loadConfig("../config.ini");
      state.endpoints = {
        C: state.config.TAGS_WEBHOOK_C || FALLBACK_ENDPOINTS.C,
        R: state.config.TAGS_WEBHOOK_R || FALLBACK_ENDPOINTS.R,
        U: state.config.TAGS_WEBHOOK_U || FALLBACK_ENDPOINTS.U,
        D: state.config.TAGS_WEBHOOK_D || FALLBACK_ENDPOINTS.D
      };

      dom.form.addEventListener("submit", onSubmitSave);
      dom.tableBody.addEventListener("click", onTableClick);

      await loadRows();
    }

    async function loadConfig(path) {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) throw new Error("CONFIG_NOT_FOUND");
      return parseIni(await response.text());
    }

    function parseIni(content) {
      const out = {};
      for (const raw of content.split(/\r?\n/)) {
        const line = raw.trim();
        if (!line || line.startsWith("#") || line.startsWith(";")) continue;
        const i = line.indexOf("=");
        if (i < 1) continue;
        out[line.slice(0, i).trim()] = line.slice(i + 1).trim();
      }
      return out;
    }

    function setStatus(message, isError = false, isSuccess = false) {
      dom.status.textContent = message;
      dom.status.className = isError ? "status error" : isSuccess ? "status success" : "status";
    }

    async function apiCall(action, data) {
      const endpoint = state.endpoints[action];
      const payload = { action, table: TABLE_NAME, data };
      const response = await fetch(endpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json, text/plain, */*"
        },
        body: JSON.stringify(payload)
      });

      const raw = await response.text();
      let parsed;
      try {
        parsed = raw ? JSON.parse(raw) : null;
      } catch {
        parsed = raw;
      }

      if (!response.ok) {
        throw new Error(`HTTP ${response.status} ${response.statusText}`);
      }

      return parsed;
    }

    async function loadRows() {
      setStatus("Chargement des thématiques...");
      const payload = await apiCall("R", {});
      const rows = normalizeReadPayload(payload);
      state.rows = rows.map((row) => ({ id: row.id, libelle: row.libelle || "" }));
      renderTable();
      setStatus(`${state.rows.length} thématique(s) chargée(s).`, false, true);
    }

    function normalizeReadPayload(payload) {
      if (Array.isArray(payload)) return payload;
      if (payload && Array.isArray(payload.data)) return payload.data;
      if (payload && Array.isArray(payload.rows)) return payload.rows;
      return [];
    }

    function renderTable() {
      const lines = state.rows.map((row) => {
        return `
          <tr data-kind="existing" data-id="${escapeHtml(row.id)}">
            <td><span class="cell-id">${escapeHtml(row.id)}</span></td>
            <td><input class="cell-input" name="libelle" value="${escapeHtml(row.libelle)}" /></td>
            <td><button type="button" class="btn btn-danger js-delete">Supprimer</button></td>
          </tr>
        `;
      });

      lines.push(`
        <tr data-kind="create">
          <td><span class="cell-id">(nouveau)</span></td>
          <td><input class="cell-input" name="libelle" value="" placeholder="Nouveau libellé" /></td>
          <td></td>
        </tr>
      `);

      dom.tableBody.innerHTML = lines.join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function collectFormRows() {
      const rows = [];
      dom.tableBody.querySelectorAll("tr[data-kind]").forEach((tr) => {
        const kind = tr.dataset.kind;
        const input = tr.querySelector('input[name="libelle"]');
        const libelle = input ? input.value.trim() : "";

        if (kind === "existing") {
          rows.push({ kind, id: Number(tr.dataset.id), libelle });
          return;
        }

        rows.push({ kind, libelle });
      });
      return rows;
    }

    function diffRows(formRows) {
      const creates = [];
      const updates = [];
      const originalMap = new Map(state.rows.map((row) => [Number(row.id), row]));

      formRows.forEach((row) => {
        if (row.kind === "create") {
          if (row.libelle) {
            creates.push({ libelle: row.libelle });
          }
          return;
        }

        const original = originalMap.get(Number(row.id));
        if (!original) return;
        if (original.libelle !== row.libelle) {
          updates.push({ id: row.id, libelle: row.libelle });
        }
      });

      return { creates, updates };
    }

    async function persistAllChanges() {
      const formRows = collectFormRows();
      const { creates, updates } = diffRows(formRows);

      if (!creates.length && !updates.length) {
        return { changed: false, createCount: 0, updateCount: 0 };
      }

      for (const payload of creates) {
        await apiCall("C", payload);
      }

      for (const payload of updates) {
        await apiCall("U", payload);
      }

      return {
        changed: true,
        createCount: creates.length,
        updateCount: updates.length
      };
    }

    async function onSubmitSave(event) {
      event.preventDefault();
      try {
        setStatus("Enregistrement en cours...");
        const result = await persistAllChanges();
        if (!result.changed) {
          setStatus("Aucune modification à enregistrer.");
          return;
        }
        await loadRows();
        setStatus(`Enregistré: ${result.createCount} création(s), ${result.updateCount} mise(s) à jour.`, false, true);
      } catch (error) {
        setStatus(`Erreur enregistrement: ${error.message || error}`, true);
      }
    }

    async function onTableClick(event) {
      const button = event.target.closest(".js-delete");
      if (!button) return;
      const rowEl = button.closest('tr[data-kind="existing"]');
      if (!rowEl) return;

      const rowId = Number(rowEl.dataset.id);
      if (!Number.isFinite(rowId)) return;

      if (!window.confirm("Confirmer la suppression de cette ligne ?")) {
        return;
      }

      try {
        setStatus("Sauvegarde préalable avant suppression...");
        await persistAllChanges();

        setStatus("Suppression en cours...");
        await apiCall("D", { id: rowId });

        await loadRows();
        setStatus("Suppression effectuée.", false, true);
      } catch (error) {
        setStatus(`Erreur suppression: ${error.message || error}`, true);
      }
    }
  </script>
</body>
</html>
